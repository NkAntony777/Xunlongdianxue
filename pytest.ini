[pytest]
# 仓库根目录运行: pytest engine/tests
testpaths = engine/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:fastapi.*

# 标记说明（可选使用: pytest -m "not slow"）
markers =
    unit: 纯函数 / 轻量单测
    api: FastAPI / 图层渲染接口
    integration: 多模块合成 DEM 集成
    slow: 预期较慢（全量四象/排名等）
